version: '3.8'

services:
  notification-service:
    build: .
    container_name: simavek-notification-service
    restart: always
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      RABBITMQ_URL: amqp://rabbitmq:5672
    volumes:
      - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro
    networks:
      - simavek-network

networks:
  simavek-network:
    external: true